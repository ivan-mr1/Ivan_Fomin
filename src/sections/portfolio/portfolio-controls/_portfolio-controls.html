<div class="portfolio__controls controls">
  <div class="controls__item">
    <div class="field portfolio__search">
      <label class="field__label" for="search-tech">Search project...</label>
      <input
        class="field__input"
        id="search-tech"
        placeholder=" "
        autocomplete="off"
        type="search"
        data-js-portfolio-search
      />
    </div>
  </div>

  <div class="controls__item">
    <div class="select" data-js-select data-js-portfolio-filter="category">
      <label
        class="select__label visually-hidden"
        id="category-select-label"
        for="category"
      >
        All categories
      </label>
      <select
        class="select__original-control field__control"
        id="category"
        tabindex="-1"
        data-js-select-original-control
      >
        <option value="all" selected>All categories</option>
        <option value="landing">Landing</option>
        <option value="e-commerce">E-commerce</option>
        <option value="to-do-list">To Do List</option>
        <option value="weather">Weather</option>
      </select>

      <div class="select__body">
        <div
          class="select__button field__control"
          tabindex="0"
          role="combobox"
          aria-expanded="false"
          aria-haspopup="listbox"
          aria-controls="category-dropdown"
          aria-labelledby="category-select-label"
          data-js-select-button
        >
          All categories
        </div>

        <div
          class="select__dropdown"
          id="category-dropdown"
          role="listbox"
          aria-labelledby="category-select-label"
          data-js-select-dropdown
        >
          <div
            class="select__option is-selected is-current"
            id="category-option-1"
            role="option"
            aria-selected="true"
            data-js-select-option
          >
            All categories
          </div>
          <div
            class="select__option"
            id="category-option-2"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            Landing
          </div>
          <div
            class="select__option"
            id="category-option-3"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            E-commerce
          </div>
          <div
            class="select__option"
            id="category-option-4"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            To Do List
          </div>
          <div
            class="select__option"
            id="category-option-5"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            Weather
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls__item">
    <div class="select" data-js-select data-js-portfolio-filter="pageType">
      <label
        class="select__label visually-hidden"
        id="page-type-select-label"
        for="pageType"
      >
        All page types
      </label>
      <select
        class="select__original-control field__control"
        id="pageType"
        tabindex="-1"
        data-js-select-original-control
      >
        <option value="all" selected>All page types</option>
        <option value="landing">Landing</option>
        <option value="multi-page">Multi-page</option>
      </select>
      <div class="select__body">
        <div
          class="select__button field__control"
          tabindex="0"
          role="combobox"
          aria-expanded="false"
          aria-haspopup="listbox"
          aria-controls="page-type-select-dropdown"
          aria-labelledby="page-type-select-label"
          data-js-select-button
        >
          All page types
        </div>
        <div
          class="select__dropdown"
          id="page-type-select-dropdown"
          role="listbox"
          aria-labelledby="page-type-select-label"
          data-js-select-dropdown
        >
          <div
            class="select__option is-selected is-current"
            id="page-type-select-option-1"
            role="option"
            aria-selected="true"
            data-js-select-option
          >
            All page types
          </div>
          <div
            class="select__option"
            id="page-type-select-option-2"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            Landing
          </div>
          <div
            class="select__option"
            id="page-type-select-option-3"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            Multi-page
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls__item">
    <div class="select" data-js-select data-js-portfolio-filter="year">
      <label
        class="select__label visually-hidden"
        id="year-select-label"
        for="year"
      >
        All years
      </label>
      <select
        class="select__original-control field__control"
        id="year"
        tabindex="-1"
        data-js-select-original-control
      >
        <option value="all" selected>All years</option>
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
      </select>
      <div class="select__body">
        <div
          class="select__button field__control"
          tabindex="0"
          role="combobox"
          aria-expanded="false"
          aria-haspopup="listbox"
          aria-controls="year-select-dropdown"
          aria-labelledby="year-select-label"
          data-js-select-button
        >
          All years
        </div>
        <div
          class="select__dropdown"
          id="year-select-dropdown"
          role="listbox"
          aria-labelledby="year-select-label"
          data-js-select-dropdown
        >
          <div
            class="select__option is-selected is-current"
            id="year-select-option-1"
            role="option"
            aria-selected="true"
            data-js-select-option
          >
            All years
          </div>
          <div
            class="select__option"
            id="year-select-option-2"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            2026
          </div>
          <div
            class="select__option"
            id="year-select-option-3"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            2025
          </div>
          <div
            class="select__option"
            id="year-select-option-4"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            2024
          </div>
          <div
            class="select__option"
            id="year-select-option-5"
            role="option"
            aria-selected="false"
            data-js-select-option
          >
            2023
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
